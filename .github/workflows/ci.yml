# CI workflow · zero-risk-platform · Wave 12 (CC#1)
#
# Runs on every PR to main and every push to main · target ~90s wall time.
# Steps:
#   1. Checkout
#   2. Setup Node (version from .nvmrc · 20 LTS)
#   3. Install deps (npm ci · uses package-lock.json)
#   4. Typecheck (tsc --noEmit · catches strict mode regressions)
#   5. Lint (next lint · ESLint rules)
#   6. Test (vitest run · 35+ tests)
#
# Future enhancements (Wave 13+):
#   - Coverage reporting (vitest --coverage + Codecov)
#   - npm audit gate (fail on HIGH/CRITICAL · with --audit-level=high)
#   - Bundle size analysis (next-bundle-analyzer · post in PR comment)
#   - E2E smoke against preview deploy

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./zero-risk-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: zero-risk-platform/.nvmrc
          cache: npm
          cache-dependency-path: zero-risk-platform/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true # Wave 12: pre-existing errors in agent-sdk-runner.ts · gate after Wave 13 fix

      - name: Lint
        run: npm run lint
        continue-on-error: true # Wave 12: same · habilitar después de cleanup

      - name: Test
        run: npm test

      - name: Audit (info only)
        run: npm audit --audit-level=critical || true # Wave 12: 4 high vulns esperan Next 14→16 · no gate aún
