name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        # Sprint 7.7 tail · `@rolldown/binding-linux-x64-gnu` native binding
        # needed para vitest Linux CI · pnpm install canónico no incluye
        # optional deps si lockfile las tiene marked optional. Force install
        # con `--config.optional=true` + rebuild.
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
          pnpm add -D @rolldown/binding-linux-x64-gnu || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # Sprint 7.7 tail · CC#3 · canon "tests CI activado" · `pnpm install` ya
        # regenera lockfile Linux (line 31-32 above) que resuelve @rolldown
        # native binding cleanly. 77/77 test files · 842/842 tests verde local
        # post Sprint 7.5 split cleanup (16 obsolete tests removed · they tested
        # pre-Sprint-7.5 Vercel-side runtime · post-split runs Railway proxy).
        run: pnpm test
