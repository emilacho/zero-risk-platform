name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: |
          rm -f pnpm-lock.yaml
          pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # Sprint 7.7 tail · CC#3 · canon "tests CI activado" · `pnpm install` ya
        # regenera lockfile Linux (line 31-32 above) que resuelve @rolldown
        # native binding cleanly. 77/77 test files · 842/842 tests verde local
        # post Sprint 7.5 split cleanup (16 obsolete tests removed · they tested
        # pre-Sprint-7.5 Vercel-side runtime · post-split runs Railway proxy).
        run: pnpm test
