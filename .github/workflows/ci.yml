name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: |
          rm -f pnpm-lock.yaml
          pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Lint canon (Sprint 7 Track C3 · strict post Sprint 8 D5)
        # Exit 0 · clean · Exit 1 · warnings only · Exit 2 · errors block CI
        # Sprint 8 D5 cleanup landed 2026-05-23 · baseline 60 errors → 0
        # (auth-missing fixes + lint-canon Windows path + handleStub/handleReadStub
        # /requireAdmin/buildDeprecatedResponse markers). Remaining 13 warnings
        # are deprecated-ref / naming-zr-shorthand (D6 sweep scope · NOT blocking).
        run: node scripts/lint-canon.mjs

      - name: Test
        # Sprint 8C D8 · vitest 3.2.4 downgrade resolved the rolldown
        # `@rolldown/binding-linux-x64-gnu` blocker that previously skipped
        # tests in CI. Combined with the vitest.config shebang-strip plugin
        # (handles `.mjs` script imports), the full 896/896 suite runs
        # cleanly on ubuntu-latest. Canon §4.3 "verify CI verde POST-push"
        # now includes test pass as a real gate.
        run: pnpm test

  # ciclo CANDADO #1 (2026-07-19) · el paquete `packages/apify-mcp-server` está
  # EXCLUIDO del tsconfig/vitest root (standalone · NodeNext · su propio toolchain).
  # Sin este job su código no lo cubre ningún gate. Lo compilamos + testeamos con su
  # propio tsc + vitest para que "CI verde" REALMENTE valide el MCP Apify. §148.
  apify-mcp-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/apify-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Install dependencies
        run: npm install

      - name: Build (tsc)
        run: npm run build

      - name: Test (vitest)
        run: npm test
